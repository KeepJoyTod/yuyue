server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: amber-film-server
  datasource:
    url: ${DB_URL:jdbc:h2:file:./data/amber-film;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
    driver-class-name: ${DB_DRIVER:org.h2.Driver}
  flyway:
    enabled: true
    locations: classpath:db/migration
  h2:
    console:
      enabled: true
      path: /h2-console

amber:
  web:
    allowed-origin-patterns: ${AMBER_ALLOWED_ORIGIN_PATTERNS:*}
  auth:
    token-secret: ${AMBER_TOKEN_SECRET:dev-secret-change-me}
    token-ttl-seconds: ${AMBER_TOKEN_TTL_SECONDS:604800}
    dev-sms-enabled: ${AMBER_AUTH_DEV_SMS_ENABLED:true}
    sms-ttl-seconds: ${AMBER_SMS_TTL_SECONDS:300}
  admin:
    token: ${AMBER_ADMIN_TOKEN:dev-admin-token}
  storage:
    provider: ${AMBER_STORAGE_PROVIDER:local}
    bucket: ${AMBER_STORAGE_BUCKET:amber-film-dev}
    public-base-url: ${AMBER_STORAGE_PUBLIC_BASE_URL:http://localhost:8080}
    upload-base-url: ${AMBER_STORAGE_UPLOAD_BASE_URL:http://localhost:8080}
    signing-secret: ${AMBER_STORAGE_SIGNING_SECRET:${AMBER_TOKEN_SECRET:dev-secret-change-me}}
    upload-ttl-seconds: ${AMBER_STORAGE_UPLOAD_TTL_SECONDS:900}
    download-ttl-seconds: ${AMBER_STORAGE_DOWNLOAD_TTL_SECONDS:900}
  payment:
    dev-callback-enabled: ${AMBER_PAYMENT_DEV_CALLBACK_ENABLED:true}
    callback-secret: ${AMBER_PAYMENT_CALLBACK_SECRET:${AMBER_TOKEN_SECRET:dev-secret-change-me}}

logging:
  pattern:
    level: "%5p [traceId:%X{traceId:-}]"
  level:
    com.amberfilm: INFO
