services:
  mysql:
    image: mysql:8.4
    container_name: amber-film-mysql
    environment:
      MYSQL_DATABASE: amber_film
      MYSQL_USER: amber_app
      MYSQL_PASSWORD: amber_app_dev
      MYSQL_ROOT_PASSWORD: amber_root_dev
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    command: ["--character-set-server=utf8mb4", "--collation-server=utf8mb4_unicode_ci"]
    volumes:
      - amber-film-mysql:/var/lib/mysql

  redis:
    image: redis:7.2
    container_name: amber-film-redis
    ports:
      - "6379:6379"
    volumes:
      - amber-film-redis:/data

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: amber-film-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: amberminio
      MINIO_ROOT_PASSWORD: amberminio-dev
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - amber-film-minio:/data

volumes:
  amber-film-mysql:
  amber-film-redis:
  amber-film-minio:
